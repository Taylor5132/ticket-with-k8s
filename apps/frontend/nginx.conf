# =====================================================================
# nginx — React SPA(static build) 서빙 설정
# 포트 5173 유지: Service/HTTPRoute/containerPort 변경 불필요.
# 클러스터에서 /api/* 는 게이트웨이가 백엔드로 라우팅하므로 nginx 는
# 정적 파일만 서빙한다 (Vite dev 프록시는 더 이상 사용 안 함).
# =====================================================================
server {
    listen 5173;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # 해시 파일명을 가진 빌드 산출물 → 장기 캐시
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — React Router(BrowserRouter) 딥링크/새로고침 404 방지.
    # 실제 파일이 없으면 index.html 을 돌려줘 클라이언트 라우팅이 처리한다.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html 은 캐시하지 않음 → 새 배포가 즉시 반영되도록
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
