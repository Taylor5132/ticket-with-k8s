workflow:
  rules:
    - when: always

stages:
  - code-quality
  - build
  - scan
  - update-manifest

variables:
  HARBOR_REGISTRY: 192.168.0.237

.build_template: &build_template
  stage: build
  before_script:
    - docker login $HARBOR_REGISTRY -u $HARBOR_USER -p $HARBOR_PASSWORD

.sonar_template: &sonar_template
  stage: code-quality

.scan_template: &scan_template
  stage: scan
  allow_failure: true

.manifest_template: &manifest_template
  stage: update-manifest
  variables:
    GIT_SSL_NO_VERIFY: "true"
  before_script:
    - git clone https://ci-manifest-token:$MANIFEST_TOKEN@192.168.0.237:8443/team6/manifest.git
    - cd manifest
    - git config user.email "ci@gitlab.local"
    - git config user.name "GitLab CI"

# =====================================================================
# code-quality stage
# =====================================================================

sonar-frontend:
  <<: *sonar_template
  script:
    - docker run --rm
        -v $CI_PROJECT_DIR:/usr/src
        -e SONAR_HOST_URL=$SONAR_HOST_URL
        -e SONAR_TOKEN=$SONAR_TOKEN_FRONTEND
        sonarsource/sonar-scanner-cli
        -Dsonar.projectKey=frontend
        -Dsonar.sources=apps/frontend/src
  rules:
    - changes:
        - apps/frontend/**/*
      when: on_success
    - when: never

sonar-auth:
  <<: *sonar_template
  script:
    - docker run --rm
        -v $CI_PROJECT_DIR:/usr/src
        -e SONAR_HOST_URL=$SONAR_HOST_URL
        -e SONAR_TOKEN=$SONAR_TOKEN_AUTH
        sonarsource/sonar-scanner-cli
        -Dsonar.projectKey=auth-service
        -Dsonar.sources=services/auth-service/app
        -Dsonar.python.version=3
  rules:
    - changes:
        - services/auth-service/**/*
      when: on_success
    - when: never

sonar-event:
  <<: *sonar_template
  script:
    - docker run --rm
        -v $CI_PROJECT_DIR:/usr/src
        -e SONAR_HOST_URL=$SONAR_HOST_URL
        -e SONAR_TOKEN=$SONAR_TOKEN_EVENT
        sonarsource/sonar-scanner-cli
        -Dsonar.projectKey=event-service
        -Dsonar.sources=services/event-service/app
        -Dsonar.python.version=3
  rules:
    - changes:
        - services/event-service/**/*
      when: on_success
    - when: never

sonar-saved:
  <<: *sonar_template
  script:
    - docker run --rm
        -v $CI_PROJECT_DIR:/usr/src
        -e SONAR_HOST_URL=$SONAR_HOST_URL
        -e SONAR_TOKEN=$SONAR_TOKEN_SAVED
        sonarsource/sonar-scanner-cli
        -Dsonar.projectKey=saved-service
        -Dsonar.sources=services/saved-service/app
        -Dsonar.python.version=3
  rules:
    - changes:
        - services/saved-service/**/*
      when: on_success
    - when: never

sonar-booking:
  <<: *sonar_template
  script:
    - docker run --rm
        -v $CI_PROJECT_DIR:/usr/src
        -e SONAR_HOST_URL=$SONAR_HOST_URL
        -e SONAR_TOKEN=$SONAR_TOKEN_BOOKING
        sonarsource/sonar-scanner-cli
        -Dsonar.projectKey=booking-service
        -Dsonar.sources=services/booking-service/app
        -Dsonar.python.version=3
  rules:
    - changes:
        - services/booking-service/**/*
      when: on_success
    - when: never

sonar-payment:
  <<: *sonar_template
  script:
    - docker run --rm
        -v $CI_PROJECT_DIR:/usr/src
        -e SONAR_HOST_URL=$SONAR_HOST_URL
        -e SONAR_TOKEN=$SONAR_TOKEN_PAYMENT
        sonarsource/sonar-scanner-cli
        -Dsonar.projectKey=payment-service
        -Dsonar.sources=services/payment-service/app
        -Dsonar.python.version=3
  rules:
    - changes:
        - services/payment-service/**/*
      when: on_success
    - when: never

# =====================================================================
# build stage
# =====================================================================

build-frontend:
  <<: *build_template
  needs: [sonar-frontend]
  script:
    - docker build -t $HARBOR_REGISTRY/booking_ticket/frontend:$CI_COMMIT_SHORT_SHA ./apps/frontend
    - docker push $HARBOR_REGISTRY/booking_ticket/frontend:$CI_COMMIT_SHORT_SHA
  rules:
    - changes:
        - apps/frontend/**/*
      when: on_success
    - when: never

build-auth:
  <<: *build_template
  needs: [sonar-auth]
  script:
    - docker build -t $HARBOR_REGISTRY/booking_ticket/auth-service:$CI_COMMIT_SHORT_SHA ./services/auth-service
    - docker push $HARBOR_REGISTRY/booking_ticket/auth-service:$CI_COMMIT_SHORT_SHA
  rules:
    - changes:
        - services/auth-service/**/*
      when: on_success
    - when: never

build-event:
  <<: *build_template
  needs: [sonar-event]
  script:
    - docker build -t $HARBOR_REGISTRY/booking_ticket/event-service:$CI_COMMIT_SHORT_SHA ./services/event-service
    - docker push $HARBOR_REGISTRY/booking_ticket/event-service:$CI_COMMIT_SHORT_SHA
  rules:
    - changes:
        - services/event-service/**/*
      when: on_success
    - when: never

build-saved:
  <<: *build_template
  needs: [sonar-saved]
  script:
    - docker build -t $HARBOR_REGISTRY/booking_ticket/saved-service:$CI_COMMIT_SHORT_SHA ./services/saved-service
    - docker push $HARBOR_REGISTRY/booking_ticket/saved-service:$CI_COMMIT_SHORT_SHA
  rules:
    - changes:
        - services/saved-service/**/*
      when: on_success
    - when: never

build-booking:
  <<: *build_template
  needs: [sonar-booking]
  script:
    - docker build -t $HARBOR_REGISTRY/booking_ticket/booking-api:$CI_COMMIT_SHORT_SHA ./services/booking-service
    - docker tag $HARBOR_REGISTRY/booking_ticket/booking-api:$CI_COMMIT_SHORT_SHA $HARBOR_REGISTRY/booking_ticket/booking-worker:$CI_COMMIT_SHORT_SHA
    - docker push $HARBOR_REGISTRY/booking_ticket/booking-api:$CI_COMMIT_SHORT_SHA
    - docker push $HARBOR_REGISTRY/booking_ticket/booking-worker:$CI_COMMIT_SHORT_SHA
  rules:
    - changes:
        - services/booking-service/**/*
      when: on_success
    - when: never

build-payment:
  <<: *build_template
  needs: [sonar-payment]
  script:
    - docker build -t $HARBOR_REGISTRY/booking_ticket/payment-service:$CI_COMMIT_SHORT_SHA ./services/payment-service
    - docker push $HARBOR_REGISTRY/booking_ticket/payment-service:$CI_COMMIT_SHORT_SHA
  rules:
    - changes:
        - services/payment-service/**/*
      when: on_success
    - when: never

# =====================================================================
# scan stage (Trivy)
# =====================================================================

scan-frontend:
  <<: *scan_template
  needs: [build-frontend]
  script:
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress --ignorefile .trivyignore
        --insecure $HARBOR_REGISTRY/booking_ticket/frontend:$CI_COMMIT_SHORT_SHA
  rules:
    - changes:
        - apps/frontend/**/*
      when: on_success
    - when: never

scan-auth:
  <<: *scan_template
  needs: [build-auth]
  script:
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress --ignorefile .trivyignore
        --insecure $HARBOR_REGISTRY/booking_ticket/auth-service:$CI_COMMIT_SHORT_SHA
  rules:
    - changes:
        - services/auth-service/**/*
      when: on_success
    - when: never

scan-event:
  <<: *scan_template
  needs: [build-event]
  script:
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress --ignorefile .trivyignore
        --insecure $HARBOR_REGISTRY/booking_ticket/event-service:$CI_COMMIT_SHORT_SHA
  rules:
    - changes:
        - services/event-service/**/*
      when: on_success
    - when: never

scan-saved:
  <<: *scan_template
  needs: [build-saved]
  script:
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress --ignorefile .trivyignore
        --insecure $HARBOR_REGISTRY/booking_ticket/saved-service:$CI_COMMIT_SHORT_SHA
  rules:
    - changes:
        - services/saved-service/**/*
      when: on_success
    - when: never

scan-booking:
  <<: *scan_template
  needs: [build-booking]
  script:
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress --ignorefile .trivyignore
        --insecure $HARBOR_REGISTRY/booking_ticket/booking-api:$CI_COMMIT_SHORT_SHA
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress --ignorefile .trivyignore
        --insecure $HARBOR_REGISTRY/booking_ticket/booking-worker:$CI_COMMIT_SHORT_SHA
  rules:
    - changes:
        - services/booking-service/**/*
      when: on_success
    - when: never

scan-payment:
  <<: *scan_template
  needs: [build-payment]
  script:
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress --ignorefile .trivyignore
        --insecure $HARBOR_REGISTRY/booking_ticket/payment-service:$CI_COMMIT_SHORT_SHA
  rules:
    - changes:
        - services/payment-service/**/*
      when: on_success
    - when: never

# =====================================================================
# update-manifest stage
# =====================================================================

update-manifest-frontend:
  <<: *manifest_template
  needs: [scan-frontend]
  script:
    - 'sed -i "s|image: $HARBOR_REGISTRY/booking_ticket/frontend:.*|image: $HARBOR_REGISTRY/booking_ticket/frontend:$CI_COMMIT_SHORT_SHA|g" booking/05-frontend.yaml'
    - git add .
    - git diff --cached --quiet || git commit -m "update frontend to $CI_COMMIT_SHORT_SHA"
    - git pull --rebase
    - git push
  rules:
    - changes:
        - apps/frontend/**/*
      when: on_success
    - when: never

update-manifest-auth:
  <<: *manifest_template
  needs: [scan-auth]
  script:
    - 'sed -i "s|image: $HARBOR_REGISTRY/booking_ticket/auth-service:.*|image: $HARBOR_REGISTRY/booking_ticket/auth-service:$CI_COMMIT_SHORT_SHA|g" booking/04-app-services.yaml'
    - git add .
    - git diff --cached --quiet || git commit -m "update auth-service to $CI_COMMIT_SHORT_SHA"
    - git pull --rebase
    - git push
  rules:
    - changes:
        - services/auth-service/**/*
      when: on_success
    - when: never

update-manifest-event:
  <<: *manifest_template
  needs: [scan-event]
  script:
    - 'sed -i "s|image: $HARBOR_REGISTRY/booking_ticket/event-service:.*|image: $HARBOR_REGISTRY/booking_ticket/event-service:$CI_COMMIT_SHORT_SHA|g" booking/04-app-services.yaml'
    - git add .
    - git diff --cached --quiet || git commit -m "update event-service to $CI_COMMIT_SHORT_SHA"
    - git pull --rebase
    - git push
  rules:
    - changes:
        - services/event-service/**/*
      when: on_success
    - when: never

update-manifest-saved:
  <<: *manifest_template
  needs: [scan-saved]
  script:
    - 'sed -i "s|image: $HARBOR_REGISTRY/booking_ticket/saved-service:.*|image: $HARBOR_REGISTRY/booking_ticket/saved-service:$CI_COMMIT_SHORT_SHA|g" booking/04-app-services.yaml'
    - git add .
    - git diff --cached --quiet || git commit -m "update saved-service to $CI_COMMIT_SHORT_SHA"
    - git pull --rebase
    - git push
  rules:
    - changes:
        - services/saved-service/**/*
      when: on_success
    - when: never

update-manifest-booking:
  <<: *manifest_template
  needs: [scan-booking]
  script:
    - 'sed -i "s|image: $HARBOR_REGISTRY/booking_ticket/booking-api:.*|image: $HARBOR_REGISTRY/booking_ticket/booking-api:$CI_COMMIT_SHORT_SHA|g" booking/04-app-services.yaml'
    - 'sed -i "s|image: $HARBOR_REGISTRY/booking_ticket/booking-worker:.*|image: $HARBOR_REGISTRY/booking_ticket/booking-worker:$CI_COMMIT_SHORT_SHA|g" booking/04-app-services.yaml'
    - git add .
    - git diff --cached --quiet || git commit -m "update booking-api and booking-worker to $CI_COMMIT_SHORT_SHA"
    - git pull --rebase
    - git push
  rules:
    - changes:
        - services/booking-service/**/*
      when: on_success
    - when: never

update-manifest-payment:
  <<: *manifest_template
  needs: [scan-payment]
  script:
    - 'sed -i "s|image: $HARBOR_REGISTRY/booking_ticket/payment-service:.*|image: $HARBOR_REGISTRY/booking_ticket/payment-service:$CI_COMMIT_SHORT_SHA|g" booking/04-app-services.yaml'
    - git add .
    - git diff --cached --quiet || git commit -m "update payment-service to $CI_COMMIT_SHORT_SHA"
    - git pull --rebase
    - git push
  rules:
    - changes:
        - services/payment-service/**/*
      when: on_success
    - when: never
