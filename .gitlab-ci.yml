        --insecure $HARBOR_REGISTRY/booking_ticket/booking-api:$CI_COMMIT_SHORT_SHA
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress --ignorefile .trivyignore
        --insecure $HARBOR_REGISTRY/booking_ticket/booking-worker:$CI_COMMIT_SHORT_SHA
