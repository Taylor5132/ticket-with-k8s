workflow:
  rules:
    - when: always

stages:
  - code-quality
  - build
  - scan
  - update-manifest

variables:
  HARBOR_REGISTRY: 192.168.0.237

.build_template: &build_template
  stage: build
  before_script:
    - docker login $HARBOR_REGISTRY -u $HARBOR_USER -p $HARBOR_PASSWORD

.sonar_template: &sonar_template
  stage: code-quality
  variables:
    GIT_DEPTH: "0"
  before_script:
    - docker login $HARBOR_REGISTRY -u $HARBOR_USER -p $HARBOR_PASSWORD

.scan_template: &scan_template
  stage: scan
  allow_failure: true

.manifest_template: &manifest_template
  stage: update-manifest
  variables:
    GIT_SSL_NO_VERIFY: "true"
  before_script:
    - git clone https://ci-manifest-token:$MANIFEST_TOKEN@192.168.0.237:8443/team6/manifest.git
    - cd manifest
    - git config user.email "ci@gitlab.local"
    - git config user.name "GitLab CI"

# =====================================================================
# code-quality stage
# =====================================================================

sonar-frontend:
  <<: *sonar_template
  variables:
    GIT_DEPTH: "0"
    GIT_CLEAN_FLAGS: -ffd -e node_modules -e apps/frontend/coverage
  script:
    - docker run --rm
        -v $CI_PROJECT_DIR:/workspace
        -w /workspace/apps/frontend
        $HARBOR_REGISTRY/booking_ticket/node:22-alpine
        sh -c "rm -rf coverage && npm ci && npm run test:coverage && sed -i 's|/workspace/apps/frontend|/usr/src/apps/frontend|g' /workspace/apps/frontend/coverage/lcov.info"
    - docker run --rm
        -v $CI_PROJECT_DIR:/usr/src
        -e SONAR_HOST_URL=$SONAR_HOST_URL
        -e SONAR_TOKEN=$SONAR_TOKEN_FRONTEND
        $HARBOR_REGISTRY/booking_ticket/sonar-scanner-cli:latest
        -Dsonar.projectKey=frontend
        -Dsonar.sources=apps/frontend/src
        -Dsonar.javascript.lcov.reportPaths=apps/frontend/coverage/lcov.info
        -Dsonar.coverage.exclusions=apps/frontend/src/pages/**,apps/frontend/src/auth.tsx,apps/frontend/src/App.tsx,apps/frontend/src/main.tsx
        -Dsonar.qualitygate.wait=true
  rules:
    - changes:
        - apps/frontend/**/*
      when: on_success
    - when: never

sonar-auth:
  <<: *sonar_template
  variables:
    GIT_DEPTH: "0"
    GIT_CLEAN_FLAGS: -ffd -e .pytest_cache -e __pycache__
  script:
    - docker run --rm
        -v $CI_PROJECT_DIR:/workspace
        -w /workspace
        python:3.12-slim
        sh -c "pip install -q pytest pytest-cov fastapi httpx sqlalchemy pyjwt bcrypt && PYTHONPATH=/workspace/services/auth-service PYTHONDONTWRITEBYTECODE=1 python -m pytest services/auth-service/tests/ --cov=services/auth-service/app --cov-report=xml:coverage-auth.xml -q -p no:cacheprovider && sed -i 's|/workspace|/usr/src|g' /workspace/coverage-auth.xml && find /workspace/services/auth-service -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null; find /workspace/services/auth-service -type d -name '.pytest_cache' -exec rm -rf {} + 2>/dev/null; true"
    - docker run --rm
        -v $CI_PROJECT_DIR:/usr/src
        -e SONAR_HOST_URL=$SONAR_HOST_URL
        -e SONAR_TOKEN=$SONAR_TOKEN_AUTH
        $HARBOR_REGISTRY/booking_ticket/sonar-scanner-cli:latest
        -Dsonar.projectKey=auth-service
        -Dsonar.sources=services/auth-service/app
        -Dsonar.python.version=3
        -Dsonar.python.coverage.reportPaths=coverage-auth.xml
        -Dsonar.qualitygate.wait=true
  rules:
    - changes:
        - services/auth-service/**/*
      when: on_success
    - when: never

