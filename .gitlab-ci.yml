# =====================================================================
# update-manifest stage
# =====================================================================

update-manifest-frontend:
  <<: *manifest_template
  needs: [scan-frontend]
  script:
    - 'sed -i "s|image: $HARBOR_REGISTRY/booking_ticket/frontend:.*|image: $HARBOR_REGISTRY/booking_ticket/frontend:$CI_COMMIT_SHORT_SHA|g" booking/05-frontend.yaml'
    - git add .
    - git diff --cached --quiet || git commit -m "update frontend to $CI_COMMIT_SHORT_SHA"
    - git pull --rebase
    - git push
  rules:
    - changes:
        - apps/frontend/**/*
      when: on_success
    - when: never

update-manifest-auth:
  <<: *manifest_template
  needs: [scan-auth]
  script:
    - 'sed -i "s|image: $HARBOR_REGISTRY/booking_ticket/auth-service:.*|image: $HARBOR_REGISTRY/booking_ticket/auth-service:$CI_COMMIT_SHORT_SHA|g" booking/04-app-services.yaml'
    - git add .
    - git diff --cached --quiet || git commit -m "update auth-service to $CI_COMMIT_SHORT_SHA"
