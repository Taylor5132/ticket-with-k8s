        - services/saved-service/**/*
      when: on_success
    - when: never

build-booking:
  <<: *build_template
  needs: [sonar-booking]
  script:
    - docker build -t $HARBOR_REGISTRY/booking_ticket/booking-api:$CI_COMMIT_SHORT_SHA ./services/booking-service
    - docker tag $HARBOR_REGISTRY/booking_ticket/booking-api:$CI_COMMIT_SHORT_SHA $HARBOR_REGISTRY/booking_ticket/booking-worker:$CI_COMMIT_SHORT_SHA
    - docker push $HARBOR_REGISTRY/booking_ticket/booking-api:$CI_COMMIT_SHORT_SHA
    - docker push $HARBOR_REGISTRY/booking_ticket/booking-worker:$CI_COMMIT_SHORT_SHA
