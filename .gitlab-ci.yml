    - when: never

# =====================================================================
# scan stage (Trivy)
# =====================================================================

scan-frontend:
  <<: *scan_template
  needs: [build-frontend]
  script:
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress --ignorefile .trivyignore
        --insecure $HARBOR_REGISTRY/booking_ticket/frontend:$CI_COMMIT_SHORT_SHA
  rules:
    - changes:
        - apps/frontend/**/*
      when: on_success
    - when: never

scan-auth:
  <<: *scan_template
  needs: [build-auth]
  script:
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress --ignorefile .trivyignore
        --insecure $HARBOR_REGISTRY/booking_ticket/auth-service:$CI_COMMIT_SHORT_SHA
  rules:
    - changes:
        - services/auth-service/**/*
      when: on_success
    - when: never

scan-event:
