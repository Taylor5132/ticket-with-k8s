    - 'sed -i "s|image: $HARBOR_REGISTRY/booking_ticket/booking-worker:.*|image: $HARBOR_REGISTRY/booking_ticket/booking-worker:$CI_COMMIT_SHORT_SHA|g" booking/04-app-services.yaml'
    - git add .
    - git diff --cached --quiet || git commit -m "update booking-api and booking-worker to $CI_COMMIT_SHORT_SHA"
    - git pull --rebase
